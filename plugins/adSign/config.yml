#功能:
#>广告牌子
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/adSign/language_cn.yml"
#################################
#####         权限          #####
#################################
#牌子管理权限
per_adSign_admin: "per.adSign.admin"
#租用广告牌的权限
per_adSign_rent: "per.adSign.rent"
#################################
#####          配置         #####
#################################
#设置广告牌用的物品ID
setItem: 268
#广告牌子标志
flag: "&4&l== [玩家广告] =="
#广告牌子点击间隔,单位毫秒
interval: 300
#广告数据保存间隔,单位秒
saveInterval: 600
#检测广告牌过期间隔,单位秒
checkInterval: 4
#每次每个广告牌检测过期成功几率
checkChance: 10
#租用广告牌价格(也是竞拍的最小价格)
rent: 10
#每次租用持续的时间,单位秒
last: 86400
#未租用牌子各行内容
line2: "&1租用花费{0}金币"
line3: "&1时长{0}小时{1}分{2}秒"
line4: "&c[潜行+右键点击租用]"
#已租用牌子初始各行内容
line2start: "&1右键点击查看说明"
line3start: "{0}"
line4start: "&c[已租用但未设置广告]"