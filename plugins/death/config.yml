#功能:
#>玩家死亡信息
#>死亡保存物品,经验
#>死亡背包中的物品耐久下降
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/death/language_cn.yml"
#################################
#####         权限          #####
#################################
#重新读取配置文件的权限
per_death_admin: "per.death.admin"
#开启/关闭玩家死亡信息的权限
per_death_msg: "per.death.msg"
#不掉落经验等级的权限
per_death_exp: "per.death.exp"
#死亡背包中物品耐久不下降的权限
per_death_durability: "per.death.durability"
#################################
#####          配置         #####
#################################
#耐久降低多少(比如10表示耐久变为原来耐久度的90%)
durabilityDel: 3
#################################
#####        死亡信息       #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
deathMsg: "plugins/death/deathMsg.yml"
#玩家是否使用displayName
displayName: true
#是否优先使用customName
customName: true
#模式2显示时间
dur: 5
#连杀有效期,单位秒
killTime: 8