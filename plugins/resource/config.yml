#功能:
#>资源随机重生(要求两个领地都有res标记且一个领地名为from?一个领地名为to?,其中?为数字.且更改要reload插件才能生效)
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/resource/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_resource_admin: "per.resource.admin"
#################################
#####         权限          #####
#################################
#检测间隔,单位秒
interval: 2
#每次检测成功几率
chance: 80