#功能:
#>矿洞
#  - 有mine标记的领地就是矿洞领地
#  - 矿洞领地除矿物类型外其它都无法打破
#  - 打破矿物类型时有几率生怪
#  - 打破蜘蛛网生一僵尸
#  - 矿物周围随机生蜘蛛网
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/mine/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_mine_admin: "per.mine.admin"
#幸运权限
per_mine_luck: "per.mine.luck"
#################################
#####         配置          #####
#################################
name: "happyVillager"
offset: 0.9
speed: 3.5
count: 22
showRange: 10                    #特效显示范围
volume: 1.6
pitch: 1.0

#设置矿物生成使用的物品ID
item: 272

#矿物生成检测间隔,单位秒
interval: 9
#每次检测成功几率
chance: 50
#根据在线玩家数修正的最大随机
fixMax: 100
#玩家数(在线玩家<=多少时) 对应的随机<=多少时
fixs:
  - "40 40"
  - "80 80"
#每次检测成功后检测生成的次数(减少生矿失败的次数)
times: 3
#幸运的玩家百分之几的几率在出怪时取消出怪
luck: 20

#蜘蛛网
net:
  interval: 6
  chance: 25
  times: 4
  
#等级对应生成矿物的几率
levels:
  level1:
    - "56 4"     #钻石
    - "14 15"    #金
    - "15 230"   #铁
    - "73 40"    #红石
    - "89 15"    #萤石
    - "21 35"    #青金石矿石
    - "16 250"   #煤
  level2:
    - "56 5"     #钻石
    - "14 20"    #金
    - "15 200"   #铁
    - "73 35"    #红石
    - "89 20"    #萤石
    - "21 40"    #青金石矿石
    - "16 230"   #煤
  level3:
    - "56 8"     #钻石
    - "14 30"    #金
    - "15 210"   #铁
    - "73 40"    #红石
    - "89 20"    #萤石
    - "21 35"    #青金石矿石
    - "16 220"   #煤
    
#矿物对应出怪的几率与数量
ores:            #矿物ID 出怪几率 检测次数 每次成功率
  - "56 55 2 80" #钻石
  - "14 50 2 50" #金
  - "15 25 1 50" #铁
  - "73 60 1 40" #红石
  - "74 60 1 40" #红石
  - "89 45 1 50" #萤石
  - "21 55 1 35" #青金石矿石
  - "16 45 1 60" #煤
  
#怪物对应出现的几率
monsters:
  - "50 30"      #爬行者
  - "51 100"     #骷髅
  - "52 90"      #蜘蛛
  - "54 350"     #僵尸
  - "55 2"       #史莱姆
  - "57 15"      #僵尸猪人
  - "59 50"      #洞穴蜘蛛
  - "66 20"      #女巫
  
#属于矿物的类型
types:
  item:
    mine:
      mode: 1
      inherit:
      types:
        - 56
        - 14
        - 15
        - 73
        - 74
        - 89
        - 21
        - 16
        - 30