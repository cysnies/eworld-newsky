#功能:
#>收费锁(同时会自动限制非玩家的实体开门)
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/lock/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限(管理)
per_lock_admin: "per.lock.admin"
#使用收费门权限(玩家)
per_lock_use: "per.lock.use"
#创建收费门权限(玩家)
per_lock_create: "per.lock.create"
#创建钥匙的权限(玩家)
per_lock_create_key: "per.lock.create.key"
#VIP权限(玩家)
per_lock_vip: "per.lock.vip"
#################################
#####          限制         #####
#################################
#是否禁止非玩家实体开门(收费锁)
banOtherInteract: true
#是否禁止非玩家实体打破门(收费锁)
banOtherBreakDoor: true
#是否禁止红石打开门(收费锁)
banRedstoneOpenDoor: true
#################################
#####        普通配置       #####
#################################
#收费上限
max: 100
#允许建立收费锁的世界(大小写敏感)(有插件管理权限的不限制)
worlds:
  - "world"
  - "world_nether"
  - "world_the_end"
#离开是否收费
leaveCost: false
#使用收费锁间隔,单位毫秒
interval: 300
#玩家通过锁付费时是否提示锁的所有者
tipOwner: true
#收税百分比(0-100,默认为5,此情况下比如玩家右键门,付费100,则锁所有者获得95,其中5会被作为税收)
rate: 5
#是否必须sneak(潜行)来通过收费锁,false表示可以sneak也可以不sneak
sneak: true
#玩家与收费锁最大距离,实数(指玩家的头与收费锁门的上方方块(门有两个方块)的距离)
range: 1.7
#################################
#####        钥匙配置       #####
#################################
key:
  item: 421                    #用做钥匙的物品ID(不能是方块的ID,默认421表示命名牌)
  show:                        #钥匙物品的显示
    name: "&3{0}"
    lore:
      - "&3所有者: &6{0}"
      - "&3有效期: &5{0}"
      - "&3提示: &6{0}"
      - "&7(钥匙)"
    length: 30                 #提示最大长度(管理权限除外)
  out: true                    #钥匙锁是否允许出来
  flag: "key"                  #建立时第三行前缀,表示建立钥匙锁(格式:'flag:钥匙名')
  format: "&1钥匙:&5 {0}"      #钥匙显示格式(牌子上)
  max: 1000                    #每次复制钥匙数量上限(管理权限除外)
  length: 7                    #钥匙名长度上限
  cost: 3                      #创建一个钥匙花费的金币
#################################
#####         vip配置       #####
#################################
#vip收费上限
maxVip: 1000
#vip是否免税
rateCancelVip: true
#vip创建钥匙花费
keyCostVip: 1
#################################
#####        高级配置       #####
#################################
#用作门的id(默认71表示铁门)
doorId: 71
#锁标记(大小写不敏感)
lock: "lock"
#建立时输入的第三行检测标记(必须一个字符)
flagEnter: "进"
flagLeave: "出"
#建立时输入的第四行检测标记(必须一个字符)
flagEmpty: "空"                #表示背包必须为空
flagMoney: "钱"                #表示身上金币必须为0
flagEffect: "效"               #表示身上必须没有药效
#第一行
#此行是用来判断一个牌子是否为锁的,并防止假冒锁
line1: "&5[锁]&3"
#第二行
#*表示价格,必须要有
line2: "&1花费: &5*金币"
#第三行
line3: "&{0}&{1}[进]&{2}&{3}[出]"
#其它
allowColor: "a"
allowLine: "a"                 #用来判断
denyColor: "c"
denyLine: "m"
#显示在第一行后面的
line1Empty: "空"               #表示背包必须为空
line1Money: "钱"               #表示身上金币必须为0
line1Effect: "效"              #表示身上必须没有药效