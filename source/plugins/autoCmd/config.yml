#功能:
#>自动定时命令
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/autoCmd/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限(管理)
per_autoCmd_admin: "per.autoCmd.admin"
#################################
#####          配置         #####
#################################
cmds:
  cmd1:
    interval: 3600               #检测间隔,单位秒
    chance: 100                  #成功几率,0-100
    sender: 1                    #命令发出者,1表示控制台,2表示随机玩家(如果是2则命令中可以使用<name>代表玩家名字,没有玩家则不发出)
    cmd: "clear start 2"