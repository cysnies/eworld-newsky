#功能:
#>MOTD
#>自动保存
#>世界读取
#>进出服务器提示
#>AFK
#>修正
#  >牌子&->\u00A7
#  >VIP聊天颜色
#  >qs商店只能建立在自己领地内
#  >对于有商店的箱子,非商店所有者不能贴牌子锁(要求玩家只能建立单个箱子商店,否则会出bug)
#  >前缀(用vip组的名字)
#  >生存加强
#  >战斗加强
#  >进服10秒聊天不显示
#  >时间杀死得等级与物品
#  >禁止农田被踩坏
#  >VIP更多血
#>聊天限制
#>付款功能
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/basic/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_basic_admin: "per.basic.admin"
#开启/关闭玩家进出服务器提示的权限
per_basic_serverMsg: "per.basic.serverMsg"
#进出服务器不显示信息的权限
per_basic_ignoreJoinLeaveMsg: "per.basic.ignore"
#使用出售命令的权限
per_need_sell: "per.need.sell"
#################################
#####          MOTD         #####
#################################
#设置为空表示不改变
motd: ""
#################################
#####        自动保存       #####
#################################
#自动保存所有世界的间隔,单位秒,设置为0表示禁用此功能
saveInterval: 480
#################################
#####       世界读取        #####
#################################
#将被读取(不存在则创建)的世界列表
worlds:
  - "world"
  - "sky"
#################################
#####   玩家进出服务器提示   ####
#################################
#模式2显示时间
dur: 5
#是否使用玩家显示名,false将直接使用玩家名字
displayName: true
#################################
#####          AFK          #####
#################################
#是否开启自动AFK
afk: true
#单位秒,当玩家位置无改变达到这个时间后自动踢出
afkTime: 300
#单位秒,afk检测间隔
afkCheckInterval: 10
#################################
#####         修正          #####
#################################
fix:
  locks:                         #哪些文字属于建立牌子锁
    - "[private]"
    - "[私有]"
prefix:
  - "diamond [&b钻石VIP&f]"
  - "gold [&6黄金VIP&f]"
  - "vip [&5VIP&f]"
str1:                            #生存加强
  interval: 30                   #检测间隔,恢复1饱食度
  per: "per.basic.str1"          #生存加强的权限
str2:                            #战斗加强
  interval: 10                   #检测间隔,恢复1生命值
  per: "per.basic.str2"          #战斗加强的权限
#玩家进服多少秒内取消聊天信息
joinTime: 10
#每多少分钟可以加等级,单位分钟,>=1
levelTime: 10
#几率(0-1000) 物品id(一个)
levelItems:
  - "70 298"   #皮
  - "40 299"
  - "65 300"
  - "90 301"
  - "10 302"   #链甲
  - "8 303"
  - "12 304"
  - "15 305"
  - "30 265"   #铁
  - "35 266"   #金
  - "80 272"   #石剑
  - "10 267"   #铁剑
#VIP更多血
moreHp:        #权限 增加的血
  - "per.basic.hp3 5"
  - "per.basic.hp2 4"
  - "per.basic.hp1 2"
#################################
#####        聊天限制       #####
#################################
chat:
  interval: 10                   #每隔多少秒检测一次
  limit: 10                      #上限
  defaultSpeed: 40               #默认聊天恢复速度
  speeds:
    - "per.chat.diamond 10"
    - "per.chat.gold 15"
    - "per.chat.vip 25"
#################################
#####         付款          #####
#################################
pay:
  base: 1                        #固定手续费
  rate: 100                      #比例手续费,0-10000