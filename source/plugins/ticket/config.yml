#功能:
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/ticket/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_ticket_admin: "per.ticket.admin"
#################################
#####         配置          #####
#################################
#控制台发出的命令
cmd: "manuadd {0} {1}"
#################################
#####       兑换码配置      #####
#################################
#两次使用的间隔,单位毫秒(有插件管理权限的无限制)
interval: 8000

#兑换码允许的字符
chars: "abcdefghjkmnopqrstuvwxyz234567890"

#兑换码长度
length: 8                        #兑换码长度
    
#次数(/use generate <次数>中的次数)
times:
  max: 100                       #上限,防止意外输入
  
#默认组
defaultGroup: "default"
#vip等级 vip组
vips:
  - "1 vip [&5VIP&f]"
  - "2 gold [&6黄金VIP&f]"
  - "3 diamond [&b钻石VIP&f]"